name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run linters
        run: |
          ruff check src/
          black --check src/
          
      - name: Type check
        run: mypy src/
        
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t chembldiscovery:${{ github.sha }} .
        
      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name api chembldiscovery:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          
      - name: Stop container
        run: docker stop api || true

  publish:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and publish package
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}