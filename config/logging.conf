# Logging configuration

[loggers]
keys=root,chembldiscovery

[handlers]
keys=console,file

[formatters]
keys=default,detailed

[logger_root]
level=INFO
handlers=console

[logger_chembldiscovery]
level=DEBUG
handlers=console,file
qualname=chembldiscovery
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=default
args=(sys.stdout,)

[handler_file]
class=FileHandler
level=DEBUG
formatter=detailed
args=('logs/chembldiscovery.log', 'a')

[formatter_default]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S